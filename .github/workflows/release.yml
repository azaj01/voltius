name: release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.1.51)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.1.51)'
        required: true
        type: string

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Extract release notes from CHANGELOG.md
        id: extract
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          version="${TAG#v}"
          notes=$(awk -v hdr="## [$version]" '
            index($0, hdr) == 1 { flag=1; next }
            flag && /^## / { flag=0 }
            flag { print }
          ' CHANGELOG.md)
          # Trim leading/trailing blank lines
          notes=$(printf '%s\n' "$notes" | sed -e '/./,$!d' | tac | sed -e '/./,$!d' | tac)
          if [ -z "$notes" ]; then
            echo "::error::No CHANGELOG.md section found for version $version. Add a '## [$version]' entry before releasing."
            exit 1
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            printf '%s\n' "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Extracted release notes for $version:"
          printf '%s\n' "$notes"

  publish-tauri:
    needs: changelog
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-24.04'
            target: 'x86_64-unknown-linux-gnu'
            args: ''

          - platform: 'ubuntu-24.04-arm'
            target: 'aarch64-unknown-linux-gnu'
            args: ''

          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: ''

          - platform: 'windows-latest'
            target: 'aarch64-pc-windows-msvc'
            args: '--target aarch64-pc-windows-msvc'

          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'

          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Read toolchain channel from rust-toolchain.toml
        id: rust
        shell: bash
        run: echo "channel=$(sed -nE 's/^channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: 'src-tauri -> target'

      - name: Install dependencies (Ubuntu native)
        if: matrix.platform == 'ubuntu-24.04' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'Voltius ${{ inputs.tag }}'
          releaseBody: ${{ needs.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          uploadPlainBinary: true
          updaterJsonPreferNsis: true

      - name: Generate checksums
        shell: bash
        run: |
          bundle_dir=$(find target -type d -path '*/release/bundle' | head -n1)
          if [ -z "$bundle_dir" ]; then echo "::error::no release bundle dir found under target/"; exit 1; fi
          echo "Bundle dir: $bundle_dir"
          sha() { if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1"; else shasum -a 256 "$1"; fi; }
          cd "$bundle_dir"
          find . -type f ! -name '*.sha256' -print0 | while IFS= read -r -d '' f; do
            sha "$f" > "$f.sha256"
          done
          echo "=== Checksums ==="
          find . -name '*.sha256' -print0 | while IFS= read -r -d '' f; do
            echo "  $f:"
            cat "$f"
          done

      - name: Upload checksums to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          bundle_dir=$(find target -type d -path '*/release/bundle' | head -n1)
          cd "$bundle_dir"
          find . -name '*.sha256' -print0 | while IFS= read -r -d '' f; do
            gh release upload "${{ inputs.tag }}" "$f" --clobber
          done

  publish-release:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ inputs.tag }}" --draft=false --latest -R "${{ github.repository }}"
